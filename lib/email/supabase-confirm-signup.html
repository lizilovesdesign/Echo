<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your Echo account</title>
  <style>
    body { margin: 0; padding: 0; background-color: hsl(7, 100%, 98%); font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    .outer { width: 100%; background-color: hsl(7, 100%, 98%); padding: 40px 16px; box-sizing: border-box; }
    .inner { max-width: 480px; margin: 0 auto; background-color: #FFFFFF; border-radius: 12px; overflow: hidden; }
    .content { padding: 40px 32px; }
    .logo-wrap { text-align: center; margin-bottom: 28px; }
    .logo-icon { width: 48px; height: 48px; border-radius: 50%; background-color: hsl(7, 100%, 98%); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; color: hsl(0, 1%, 47%); }
    .logo-text { font-size: 24px; font-weight: 500; color: hsl(9, 12%, 11%); letter-spacing: -0.36px; }
    .heading { font-size: 24px; font-weight: 500; color: hsl(9, 12%, 11%); line-height: 36px; letter-spacing: -0.36px; margin: 0 0 8px; text-align: center; }
    .text { font-size: 14px; line-height: 21px; letter-spacing: -0.21px; color: hsl(0, 1%, 28%); margin: 0 0 20px; text-align: center; }
    .btn-wrap { text-align: center; margin: 28px 0; }
    .btn { display: inline-block; padding: 12px 32px; background-color: hsl(9, 100%, 70%); color: hsl(0, 0%, 100%) !important; text-decoration: none; border-radius: 999px; font-size: 14px; font-weight: 500; line-height: 21px; letter-spacing: -0.21px; }
    .footer { padding: 20px 32px; background-color: hsl(8, 40%, 92%); text-align: center; }
    .footer-text { font-size: 12px; line-height: 18px; letter-spacing: -0.18px; color: hsl(0, 1%, 47%); margin: 0; }
  </style>
</head>
<body>
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" class="outer">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" role="presentation" class="inner">
          <tr>
            <td class="content">
              <div class="logo-wrap">
                <div class="logo-icon">&#9835;</div>
                <div class="logo-text">echo</div>
              </div>
              <h1 class="heading">Confirm your email</h1>
              <p class="text">
                Thanks for joining Echo. Click the button below to verify your email address and start capturing your musical memories.
              </p>
              <div class="btn-wrap">
                <a href="{{ .ConfirmationURL }}" class="btn">Verify Email</a>
              </div>
              <p class="text" style="font-size: 13px; color: hsl(0, 1%, 47%); margin-top: 16px;">
                If you didn't sign up for Echo, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td class="footer">
              <p class="footer-text">Echo — your private music journal</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
