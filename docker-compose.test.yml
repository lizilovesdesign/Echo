version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: echo-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echo_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 2s
      retries: 10

  supabase-test:
    image: supabase/postgres:16.3.1.0
    container_name: echo-test-supabase
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echo_test
    ports:
      - '54321:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 2s
      retries: 10
